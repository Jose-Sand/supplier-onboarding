name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

# ══════════════════════════════════════════════════════════════════
#  checklist-service
# ══════════════════════════════════════════════════════════════════
jobs:
  # ──────────────────────────────────────────────────────────────────
  checklist-lint:
    name: '[checklist] Lint & Type Check'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: checklist-service

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: checklist-service/package-lock.json

      - run: npm ci
      - run: npx prisma generate
      - run: npx tsc --noEmit

  # ──────────────────────────────────────────────────────────────────
  checklist-test:
    name: '[checklist] Test'
    needs: checklist-lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: checklist-service

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: checklist-service/package-lock.json

      - run: npm ci
      - run: npx prisma generate
      - run: npm test -- --run

  # ──────────────────────────────────────────────────────────────────
  checklist-build:
    name: '[checklist] Build'
    needs: checklist-test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: checklist-service

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: checklist-service/package-lock.json

      - run: npm ci
      - run: npx prisma generate
      - run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: checklist-dist
          path: checklist-service/dist/
          retention-days: 1
          if-no-files-found: error

  # ──────────────────────────────────────────────────────────────────
  checklist-docker:
    name: '[checklist] Docker Build & Push'
    needs: checklist-build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - uses: docker/build-push-action@v6
        with:
          context: ./checklist-service
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/checklist-service:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/checklist-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

# ══════════════════════════════════════════════════════════════════
#  supplier-service
# ══════════════════════════════════════════════════════════════════

  # ──────────────────────────────────────────────────────────────────
